[plugin]

name="SuperMarker3D"
description="Graphic-design-oriented 3D marker node. Six shape categories (Axis, Mesh, Shape, Curve, Arrow, Figure) with wireframe / silhouette modes, customizable colors, lengths, and per-instance configuration. Useful for blocking out gameplay, debugging spatial relationships, and prototyping."
author="Reynard"
version="1.0.0-beta1"
script="plugin.gd"
